services:
  # 使用带 pgvector 的镜像，否则 migrations 中 CREATE EXTENSION vector 会失败。
  postgres:
    image: pgvector/pgvector:pg16
    container_name: roc-postgres
    environment:
      POSTGRES_DB: online_course
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d online_course"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: roc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # 对象实际存放在命名卷 minio_data（容器内 /data），不会在 postgres/redis 容器里出现；查看数据请 exec 进 roc-minio 或 docker volume inspect。
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: roc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30

  # docreader-http：本地解析（PDF/docx/pptx/文本/图片元数据），依赖 MinIO；make dev / --profile dev 会启动。
  docreader-http:
    build:
      context: ./services/docreader-http
      dockerfile: Dockerfile
    container_name: roc-docreader-http
    profiles: ["parser", "dev"]
    ports:
      - "8090:8080"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: course-resources
      INTERNAL_TOKEN: ${DOCREADER_INTERNAL_TOKEN:-}
      # OCR：none 关闭；tesseract 使用容器内 Tesseract；http 见 docreader-http README
      OCR_BACKEND: ${OCR_BACKEND:-none}
      OCR_TESSERACT_LANG: ${OCR_TESSERACT_LANG:-chi_sim+eng}
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 25s

volumes:
  pg_data:
  redis_data:
  minio_data:
