openapi: 3.0.3
info:
  title: Online Course API
  version: 1.0.0
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
paths:
  /auth/register:
    post:
      summary: 用户注册（学生或老师）
      requestBody:
        required: true
      responses:
        '201':
          description: created
  /auth/login:
    post:
      summary: 用户登录（account 支持 email 或 username）
      responses:
        '200':
          description: 登录成功，返回 access/refresh token
  /auth/refresh:
    post:
      summary: 刷新 Access Token
      responses:
        '200':
          description: token refreshed
  /me:
    get:
      summary: 当前用户信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ok
  /teacher/courses:
    post:
      summary: 教师创建课程
      security:
        - bearerAuth: []
      responses:
        '201':
          description: created
  /teacher/courses/{courseId}:
    put:
      summary: 教师更新课程
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: updated
  /teacher/courses/{courseId}/chapters:
    post:
      summary: 教师新增章节（带顺序）
      security:
        - bearerAuth: []
      responses:
        '201':
          description: created
  /teacher/chapters/{chapterId}/reorder:
    put:
      summary: 教师调整章节顺序
      security:
        - bearerAuth: []
      responses:
        '204':
          description: updated
  /teacher/courses/{courseId}/chapters/{chapterId}/sections:
    get:
      summary: 列出章节下的节
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ok
    post:
      summary: 在章节下新增节
      security:
        - bearerAuth: []
      responses:
        '201':
          description: created
  /teacher/sections/{sectionId}/resources/init-upload:
    post:
      summary: 初始化资源上传（返回 MinIO 预签名上传 URL；资源挂在节下）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: presigned upload url
  /teacher/sections/{sectionId}/resources/confirm:
    post:
      summary: 上传完成后确认资源入库
      security:
        - bearerAuth: []
      responses:
        '201':
          description: created
  /teacher/resources/{resourceId}/summarize:
    post:
      summary: 文档类资源 AI 摘要（解析正文后调用问答模型）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ok
  /teacher/resources/{resourceId}/reorder:
    put:
      summary: 教师调整资源顺序
      security:
        - bearerAuth: []
      responses:
        '204':
          description: updated
  /courses:
    get:
      summary: 学生查看可选课程（已发布）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ok
  /courses/{courseId}/enroll:
    post:
      summary: 学生选课
      security:
        - bearerAuth: []
      responses:
        '204':
          description: enrolled
  /my/courses:
    get:
      summary: 学生已选课程列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ok
  /my/courses/{courseId}/catalog:
    get:
      summary: 学生获取课程目录（章节 → 节 → 资源，按 sort_order）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: ok
  /my/resources/{resourceId}/progress:
    post:
      summary: 学生上报学习进度
      security:
        - bearerAuth: []
      responses:
        '204':
          description: updated
  /my/resources/{resourceId}/complete:
    post:
      summary: 学生标记资源学习完成
      security:
        - bearerAuth: []
      responses:
        '204':
          description: completed
